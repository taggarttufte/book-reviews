<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --bg: #fafaf9;
      --bg-card: #ffffff;
      --border: #e5e7eb;
      --accent: #7c3aed;
      --accent-light: #ede9fe;
      --serif: 'Lora', Georgia, serif;
      --sans: 'Inter', -apple-system, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --bg: #0f1117;
        --bg-card: #1a1b26;
        --border: #2e3144;
        --accent: #a78bfa;
        --accent-light: #1e1b4b;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 16px;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 40px;
    }
    header h1 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    header h1 a {
      color: var(--text);
      text-decoration: none;
    }
    header p {
      color: var(--text-muted);
      font-size: 15px;
    }
    nav {
      margin-top: 12px;
      display: flex;
      gap: 20px;
      font-size: 14px;
    }
    nav a {
      color: var(--text-muted);
      text-decoration: none;
    }
    nav a:hover { color: var(--accent); }
    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 13px;
    }
    footer a { color: var(--text-muted); }
    a { color: var(--accent); }
    h2 { font-family: var(--serif); font-size: 22px; margin: 32px 0 12px; }
    h3 { font-size: 18px; margin: 24px 0 8px; }
    p { margin-bottom: 16px; }
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 20px;
      margin: 20px 0;
      color: var(--text-muted);
      font-style: italic;
    }
    code {
      background: var(--accent-light);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }
    pre code { display: block; padding: 16px; overflow-x: auto; }
    .review-card {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 16px;
      background: var(--bg-card);
      transition: border-color 0.2s;
    }
    .review-card:hover { border-color: var(--accent); }
    .review-card a { text-decoration: none; color: inherit; }
    .review-card h3 {
      font-family: var(--serif);
      font-size: 19px;
      margin: 0 0 4px;
      color: var(--text);
    }
    .review-card .author {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 8px;
    }
    .review-card .summary {
      font-size: 15px;
      color: var(--text);
      margin-bottom: 10px;
    }
    .review-card .meta {
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .tag {
      background: var(--accent-light);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .rating { letter-spacing: 2px; }
    .review-header { margin-bottom: 32px; }
    .review-header h1 {
      font-family: var(--serif);
      font-size: 32px;
      line-height: 1.3;
      margin-bottom: 8px;
    }
    .review-header .book-meta {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 12px;
    }
    .review-header .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .review-body { font-family: var(--serif); font-size: 17px; line-height: 1.8; }
    .review-body h2 { font-size: 24px; margin: 40px 0 16px; }
    .review-body h3 { font-family: var(--serif); font-size: 20px; margin: 32px 0 12px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
      <p>{{ site.description }}</p>
      <nav>
        <a href="{{ site.baseurl }}/">Reviews</a>
        <a href="{{ site.baseurl }}/about/">About</a>
        <a href="https://github.com/taggarttufte">GitHub</a>
        <a href="https://www.goodreads.com/user/show/174825927-taggart">Goodreads</a>
      </nav>
    </header>
    {{ content }}
    <footer>
      <p>&copy; {{ 'now' | date: '%Y' }} Taggart Tufte | <a href="https://github.com/taggarttufte/book-reviews">Source</a></p>
    </footer>
  </div>
</body>
</html>
